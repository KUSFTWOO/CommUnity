services:
  # 웹 서비스 정의
  - type: web
    name: community-web
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py create_admin --email admin@example.com --password admin123
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        value: django-insecure-9z!@bn#xz_9v-&c3$*b6d%^j*l+0f^v@!_6c^+3zx!k^%@8d9
      - key: DATABASE_URL
        fromDatabase:
          name: community-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "community-web.onrender.com,community-web-9yzv.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://community-web.onrender.com,https://community-web-9yzv.onrender.com"
      - key: DB_SSLMODE
        value: "require"

databases:
  # PostgreSQL 데이터베이스 정의
  - name: community-db
    plan: free
    region: ohio
