{% extends 'dashboard/base.html' %}

{% block dashboard_content %}
<div class="dashboard-header">
    <h1>일정 관리</h1>
</div>

<!-- 일정 목록 -->
<div class="table-wrapper">
    <table class="dashboard-table">
        <thead>
            <tr>
                <th style="width: 30%;">제목</th>
                <th style="width: 20%;">기간</th>
                <th style="width: 15%;">장소</th>
                <th style="width: 20%;">작성자</th>
                <th style="width: 100px;">관리</th>
            </tr>
        </thead>
        <tbody>
            {% for event in events %}
            <tr>
                <td><a href="{% url 'dashboard:event_manage' event.id %}">{{ event.title }}</a></td>
                <td>{{ event.duration_display }}</td>
                <td>{{ event.location|default:"-" }}</td>
                <td>{{ event.created_by.nickname }}</td>
                <td><a href="{% url 'dashboard:event_manage' event.id %}" class="btn btn-sm" style="padding: 4px 8px; font-size: 12px; background: #0066cc; color: white; text-decoration: none; border-radius: 3px;">상세</a></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" style="text-align: center; color: #6c757d; padding: 30px;">일정이 없습니다.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
