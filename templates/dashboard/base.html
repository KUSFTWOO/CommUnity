{% extends 'base.html' %}

{% block extra_css %}
<style>
    .dashboard-container {
        display: flex;
        min-height: calc(100vh - 120px);
    }

    .dashboard-sidebar {
        width: 250px;
        background: #f8f9fa;
        border-right: 1px solid #dee2e6;
        padding: 20px;
        position: fixed;
        height: calc(100vh - 120px);
        overflow-y: auto;
    }

    .dashboard-content {
        flex: 1;
        margin-left: 250px;
        padding: 30px;
        background: #fff;
    }

    .sidebar-menu {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .sidebar-menu li {
        margin-bottom: 10px;
    }

    .sidebar-menu a {
        display: block;
        padding: 12px 15px;
        color: #495057;
        text-decoration: none;
        border-radius: 5px;
        transition: all 0.3s;
    }

    .sidebar-menu a:hover,
    .sidebar-menu a.active {
        background: #e7f3ff;
        color: #0066cc;
        font-weight: 500;
    }

    .sidebar-title {
        font-size: 12px;
        font-weight: 600;
        color: #6c757d;
        text-transform: uppercase;
        margin: 20px 0 10px 0;
        padding-left: 15px;
    }

    .dashboard-header {
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .dashboard-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 600;
    }

    /* 통계 카드 */
    .stat-card {
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s;
    }

    .stat-card:hover {
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .stat-card-value {
        font-size: 32px;
        font-weight: 700;
        color: #0066cc;
        margin: 10px 0;
    }

    .stat-card-label {
        color: #6c757d;
        font-size: 14px;
    }

    /* 테이블 스타일 */
    .table-wrapper {
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        overflow: hidden;
    }

    .dashboard-table {
        width: 100%;
        border-collapse: collapse;
    }

    .dashboard-table th {
        background: #f8f9fa;
        padding: 15px;
        text-align: left;
        font-weight: 600;
        color: #495057;
        border-bottom: 2px solid #dee2e6;
    }

    .dashboard-table td {
        padding: 15px;
        border-bottom: 1px solid #dee2e6;
    }

    .dashboard-table tbody tr:hover {
        background: #f9f9f9;
    }

    .dashboard-table a {
        color: #0066cc;
        text-decoration: none;
    }

    .dashboard-table a:hover {
        text-decoration: underline;
    }

    /* 상태 배지 */
    .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
    }

    .badge-success {
        background: #d4edda;
        color: #155724;
    }

    .badge-danger {
        background: #f8d7da;
        color: #721c24;
    }

    .badge-warning {
        background: #fff3cd;
        color: #856404;
    }

    .badge-info {
        background: #d1ecf1;
        color: #0c5460;
    }

    /* 버튼 스타일 */
    .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
        margin-right: 5px;
    }

    .btn-primary {
        background: #0066cc;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
    }

    .btn-primary:hover {
        background: #0052a3;
    }

    .btn-danger {
        background: #dc3545;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
    }

    .btn-danger:hover {
        background: #c82333;
    }

    .btn-secondary {
        background: #6c757d;
        color: white;
    }

    .btn-secondary:hover {
        background: #5a6268;
    }

    /* 검색 폼 */
    .search-form {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
    }

    .search-form input {
        padding: 8px 12px;
        border: 1px solid #dee2e6;
        border-radius: 5px;
        flex: 1;
    }

    .search-form button {
        padding: 8px 16px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    /* 페이징 */
    .pagination {
        display: flex;
        gap: 5px;
        margin-top: 20px;
        justify-content: center;
    }

    .pagination a,
    .pagination span {
        padding: 8px 12px;
        border: 1px solid #dee2e6;
        border-radius: 5px;
        text-decoration: none;
        color: #0066cc;
    }

    .pagination .current {
        background: #0066cc;
        color: white;
        border-color: #0066cc;
    }

    /* 그리드 레이아웃 */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    /* 반응형 */
    @media (max-width: 768px) {
        .dashboard-sidebar {
            width: 200px;
            padding: 15px;
        }

        .dashboard-content {
            margin-left: 200px;
            padding: 20px;
        }

        .stats-grid {
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .dashboard-table {
            font-size: 13px;
        }

        .dashboard-table th,
        .dashboard-table td {
            padding: 10px;
        }
    }

    @media (max-width: 576px) {
        .dashboard-sidebar {
            position: relative;
            width: 100%;
            height: auto;
            border-right: none;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 20px;
        }

        .dashboard-content {
            margin-left: 0;
            padding: 15px;
        }

        .stats-grid {
            grid-template-columns: 1fr;
        }

        .dashboard-table {
            font-size: 12px;
        }

        .dashboard-table th,
        .dashboard-table td {
            padding: 8px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <!-- 사이드바 -->
    <nav class="dashboard-sidebar">
        <div style="margin-bottom: 30px;">
            <h3 style="margin: 0 0 10px 0; color: #333;">관리 메뉴</h3>
        </div>

        <ul class="sidebar-menu">
            <li class="sidebar-title">관리</li>
            <li><a href="{% url 'dashboard:index' %}" {% if request.resolver_match.url_name == 'index' %}class="active"{% endif %}>대시보드</a></li>
            <li><a href="{% url 'dashboard:users' %}" {% if request.resolver_match.url_name == 'users' %}class="active"{% endif %}>회원 관리</a></li>

            <li class="sidebar-title">콘텐츠</li>
            <li><a href="{% url 'dashboard:notices' %}" {% if request.resolver_match.url_name == 'notices' %}class="active"{% endif %}>공지사항</a></li>
            <li><a href="{% url 'dashboard:posts' %}" {% if request.resolver_match.url_name == 'posts' %}class="active"{% endif %}>게시글</a></li>
            <li><a href="{% url 'dashboard:calendar_manage' %}" {% if 'calendar' in request.resolver_match.url_name %}class="active"{% endif %}>일정</a></li>

            <li class="sidebar-title">투표/설문</li>
            <li><a href="{% url 'dashboard:polls' %}" {% if request.resolver_match.url_name == 'polls' %}class="active"{% endif %}>투표 관리</a></li>
            <li><a href="{% url 'dashboard:surveys' %}" {% if request.resolver_match.url_name == 'surveys' %}class="active"{% endif %}>설문 관리</a></li>
        </ul>
    </nav>

    <!-- 메인 콘텐츠 -->
    <div class="dashboard-content">
        {% block dashboard_content %}{% endblock %}
    </div>
</div>
{% endblock %}
