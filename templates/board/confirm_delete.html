{% extends "base.html" %}

{% block title %}게시글 삭제 — CommUnity{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="rounded-xl border border-red-200 bg-white p-8 text-center">
        <div class="text-5xl mb-4">🗑️</div>
        <h1 class="text-xl font-bold text-gray-900 mb-4">게시글을 삭제하시겠어요?</h1>
        <p class="text-gray-500 text-sm mb-6">
            <span class="font-medium text-gray-700">{{ post.title }}</span> 게시글이 영구적으로 삭제됩니다.<br>
            이 작업은 되돌릴 수 없습니다.
        </p>

        <form method="post" class="flex gap-3 justify-center">
            {% csrf_token %}
            <button type="submit"
                    class="rounded-lg bg-red-600 px-6 py-2 font-medium text-white transition-colors hover:bg-red-700">
                삭제하기
            </button>
            <a href="{% url 'board:detail' post.pk %}"
               class="rounded-lg border border-gray-300 px-6 py-2 font-medium text-gray-700 transition-colors hover:bg-gray-50">
                취소
            </a>
        </form>
    </div>
</div>
{% endblock %}
