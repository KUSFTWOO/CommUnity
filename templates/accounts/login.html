{% extends "base.html" %}

{% block title %}로그인 - CommUnity{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">로그인</h1>
            <p class="text-gray-500">CommUnity에 로그인하세요</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-lg border border-gray-200 shadow-md p-8">
            <form method="post" class="space-y-4">
                {% csrf_token %}

                <!-- Email -->
                <div>
                    <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">
                        {{ form.email.label }}
                    </label>
                    {{ form.email }}
                </div>

                <!-- Password -->
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">
                        {{ form.password.label }}
                    </label>
                    {{ form.password }}
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2 rounded-lg hover:bg-indigo-700 transition-colors mt-6">
                    로그인
                </button>
            </form>

            <!-- Signup & Forgot Password Links -->
            <div class="mt-6 space-y-2 text-center">
                <p class="text-sm text-gray-600">
                    계정이 없으신가요?
                    <a href="{% url 'accounts:signup' %}" class="text-indigo-600 font-medium hover:text-indigo-700">
                        회원가입
                    </a>
                </p>
                <p class="text-sm text-gray-600">
                    <a href="#" class="text-indigo-600 font-medium hover:text-indigo-700">
                        비밀번호 찾기
                    </a>
                </p>
            </div>
        </div>

        <!-- Demo Account -->
        <div class="mt-6 p-4 bg-green-50 rounded-lg border border-green-200">
            <p class="text-sm text-green-800">
                👤 <strong>테스트 계정:</strong>
                <br/>
                - 이메일: admin@example.com
                <br/>
                - 비밀번호: admin123
            </p>
        </div>
    </div>
</div>
{% endblock %}
